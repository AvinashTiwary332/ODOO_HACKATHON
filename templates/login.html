{% extends "base.html" %}
{% block content %}
<section class="auth-shell">
  <div class="auth-panel">
    <div class="brand-mark"><i class="fa-solid fa-cubes"></i></div>
    <h1>Welcome to HRMS</h1>
    <p>Sign in to manage people, attendance, leave, and payroll.</p>
    <form method="post" class="stacked-form">
      <input class="form-control" type="email" name="email" placeholder="Email" required>
      <input class="form-control" type="password" name="password" placeholder="Password" required>
      <button class="btn btn-primary w-100"><i class="fa-solid fa-right-to-bracket"></i> Login</button>
    </form>
    <div class="auth-links">
      <a href="{{ url_for('auth.register') }}">Create account</a>
      <a href="{{ url_for('auth.forgot_password') }}">Forgot password?</a>
    </div>
    <div class="demo-box">Demo: admin@hrms.test / Admin@123</div>
  </div>
</section>
{% endblock %}
